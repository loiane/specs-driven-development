name: Feature / skill request
description: Propose a new skill, command, template section, or methodology change.
labels: [enhancement]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Kind of change
      options:
        - New skill
        - New slash command
        - New template / template section
        - Methodology change (phases, exit contracts)
        - Harness / hook change
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: parity
    attributes:
      label: Tri-platform parity
      description: Confirm you'll mirror this across `.claude/`, `.github/`, `.windsurf/`.
      options:
        - label: I will update all three platform directories in the PR
        - label: N/A (docs / CI / example only)
