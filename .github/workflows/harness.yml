name: harness

# Spring Boot harness CI — for projects that USE this toolkit.
#
# Copy this file into your Spring Boot project's .github/workflows/.
# It runs the EXACT same scripts the local agent runs, so a passing local
# /validate equals a passing CI build (modulo flakes). If this workflow
# diverges from `scripts/harness.sh`, the local agents are wrong about
# what "passes". Keep parity ruthlessly.
#
# Prerequisites: pom.xml at repo root, scripts/ from the toolkit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # for the PR comment step
  checks: write

concurrency:
  group: harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: Spec-driven harness
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout (full history for openapi diff + new-code coverage)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Install jq (used by harness.sh)
        run: |
          if ! command -v jq >/dev/null; then sudo apt-get update && sudo apt-get install -y jq; fi

      - name: Make harness scripts executable
        run: chmod +x scripts/*.sh

      - name: Detect stack
        run: |
          ./scripts/detect-stack.sh | tee target-stack.json
          mkdir -p .specs
          cp target-stack.json .specs/_stack.json
          if jq -e '.migration == "both"' target-stack.json >/dev/null; then
            echo "::error::Both Flyway and Liquibase detected. Pick one." >&2
            exit 1
          fi

      - name: Run harness (10 layers)
        run: ./scripts/harness.sh --report > target/harness-summary.json
        env:
          MAVEN_OPTS: -Xmx2g
          TESTCONTAINERS_REUSE_ENABLE: 'true'

      - name: New-code coverage gate
        run: |
          BASE_REF=origin/${{ github.base_ref || 'main' }} ./scripts/check-new-code-coverage.sh

      - name: Traceability matrix (per active feature)
        run: |
          for spec_dir in .specs/*/; do
            [ -d "$spec_dir" ] || continue
            id="$(basename "$spec_dir")"
            [[ "$id" == _* ]] && continue   # skip _onboarding, _stack, etc.
            ./scripts/traceability.sh "$id" || true
          done

      - name: Upload harness summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-summary
          path: |
            target/harness-summary.json
            target/new-code-coverage.json
            target/site/jacoco/
            target/pit-reports/
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 14

      - name: Summarize gates in job summary
        if: always()
        run: |
          {
            echo "## Harness gates"
            echo
            echo '```json'
            jq '.gates' target/harness-summary.json 2>/dev/null || echo '{"error":"no summary"}'
            echo '```'
            echo
            if [ -f target/new-code-coverage.json ]; then
              echo "### New-code coverage"
              echo '```json'
              cat target/new-code-coverage.json
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary;
            try { summary = JSON.parse(fs.readFileSync('target/harness-summary.json', 'utf8')); }
            catch (e) { summary = { error: String(e) }; }
            let newCov = '_(no diff)_';
            try { newCov = JSON.stringify(JSON.parse(fs.readFileSync('target/new-code-coverage.json', 'utf8'))); } catch (_) {}
            const body = [
              '### Spec-driven harness result',
              '',
              '```json',
              JSON.stringify(summary.gates ?? summary, null, 2),
              '```',
              '',
              `**New-code coverage:** \`${newCov}\``,
              '',
              '_Identical to a local `/validate` run. If this fails and your local run passed, the hooks were bypassed; investigate._',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
