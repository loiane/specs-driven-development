name: ci

# Toolkit-repo CI.
#
# This workflow validates the toolkit itself (docs, scripts, templates).
# It does NOT run the Spring harness — there is no application code here.
# Consumers who copy the toolkit into their Spring Boot project should use
# .github/workflows/harness.yml instead.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-toolkit:
    name: Validate toolkit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck scripts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck scripts/*.sh

      - name: Validate YAML files
        run: |
          pip install --quiet yamllint
          yamllint -d relaxed .github/workflows/*.yml

      - name: Check for broken internal Markdown links
        run: |
          error=0
          # Find markdown links of the form [text](relative/path) and verify the target exists
          while IFS= read -r file; do
            grep -oP '\[.*?\]\(\K[^)#]+' "$file" 2>/dev/null | while IFS= read -r target; do
              # Skip URLs
              [[ "$target" =~ ^https?:// ]] && continue
              # Resolve relative to the file's directory
              dir="$(dirname "$file")"
              resolved="$dir/$target"
              if [ ! -e "$resolved" ]; then
                echo "::warning file=$file::Broken link: $target"
                error=1
              fi
            done
          done < <(find . -name '*.md' -not -path './.git/*')
          exit "$error"

      - name: Verify shared skill and agent structure
        run: |
          error=0
          # Every shared skill must have a SKILL.md
          for dir in shared/skills/*/; do
            if [ ! -f "$dir/SKILL.md" ]; then
              echo "::error::Missing SKILL.md in $dir"
              error=1
            fi
          done
          # Every shared agent must have an AGENT.md
          for dir in shared/agents/*/; do
            if [ ! -f "$dir/AGENT.md" ]; then
              echo "::error::Missing AGENT.md in $dir"
              error=1
            fi
          done
          # Every .claude skill wrapper must point to a shared skill
          for dir in .claude/skills/*/; do
            name="$(basename "$dir")"
            if [ ! -d "shared/skills/$name" ]; then
              echo "::error::.claude/skills/$name has no matching shared/skills/$name"
              error=1
            fi
          done
          exit "$error"
