name: ci

# Toolkit-repo CI.
#
# This workflow validates the toolkit itself (docs, scripts, templates).
# It does NOT run the Spring harness — there is no application code here.
# Consumers who copy the toolkit into their Spring Boot project should use
# .github/workflows/harness.yml instead.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-toolkit:
    name: Validate toolkit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck scripts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck .github/scripts/*.sh

      - name: Validate YAML files
        run: |
          pip install --quiet yamllint
          yamllint -d relaxed .github/workflows/*.yml

      - name: Check for broken internal Markdown links
        run: |
          error=0
          # Find markdown links of the form [text](relative/path) and verify the target exists
          while IFS= read -r file; do
            grep -oP '\[.*?\]\(\K[^)#]+' "$file" 2>/dev/null | while IFS= read -r target; do
              # Skip URLs
              [[ "$target" =~ ^https?:// ]] && continue
              # Resolve relative to the file's directory
              dir="$(dirname "$file")"
              resolved="$dir/$target"
              if [ ! -e "$resolved" ]; then
                echo "::warning file=$file::Broken link: $target"
                error=1
              fi
            done
          done < <(find . -name '*.md' -not -path './.git/*')
          exit "$error"

      - name: Verify IDE skill and agent structure
        run: |
          error=0
          # Every .claude skill must have a SKILL.md
          for dir in .claude/skills/*/; do
            if [ ! -f "${dir}SKILL.md" ]; then
              echo "::error::Missing SKILL.md in $dir"
              error=1
            fi
          done
          # Every .github skill must have a SKILL.md
          for dir in .github/skills/*/; do
            if [ ! -f "${dir}SKILL.md" ]; then
              echo "::error::Missing SKILL.md in $dir"
              error=1
            fi
          done
          # Every .windsurf skill must have a SKILL.md
          for dir in .windsurf/skills/*/; do
            if [ ! -f "${dir}SKILL.md" ]; then
              echo "::error::Missing SKILL.md in $dir"
              error=1
            fi
          done
          # Every .claude agent wrapper must have a matching .github chatmode and .windsurf workflow
          for f in .claude/agents/*.md; do
            name="$(basename "$f" .md)"
            if [ ! -f ".github/chatmodes/${name}.chatmode.md" ]; then
              echo "::error::Missing .github/chatmodes/${name}.chatmode.md"
              error=1
            fi
            if [ ! -f ".windsurf/workflows/${name}.md" ]; then
              echo "::error::Missing .windsurf/workflows/${name}.md"
              error=1
            fi
          done
          exit "$error"
